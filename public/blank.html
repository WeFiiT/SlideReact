<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Publication SharePoint…</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Inter, system-ui, sans-serif;
      background: #FBFAF7;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #1A1E2C;
    }
    .card {
      background: #fff;
      border: 1px solid #E8E6E1;
      border-radius: 16px;
      padding: 40px 48px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(20, 28, 60, 0.07);
      max-width: 360px;
      width: 100%;
    }
    .logo {
      font-size: 22px;
      font-weight: 800;
      color: #0E2A6B;
      letter-spacing: -0.5px;
      margin-bottom: 28px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #E8E6E1;
      border-top-color: #0E2A6B;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .label {
      font-size: 15px;
      font-weight: 600;
      color: #0E2A6B;
      margin-bottom: 8px;
    }
    .sub {
      font-size: 13px;
      color: #6E7385;
      line-height: 1.5;
    }
    .close-btn {
      display: none;
      margin-top: 20px;
      background: #0E2A6B;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">WeMission</div>
    <div class="spinner" id="spinner"></div>
    <div class="label" id="label">Publication SharePoint en cours…</div>
    <div class="sub" id="sub">Connexion à Microsoft en cours.<br>Cette fenêtre se fermera automatiquement.</div>
    <button class="close-btn" id="close-btn" onclick="window.close()">Fermer cette fenêtre</button>
  </div>
  <script src="/msal-redirect-bridge.min.js"></script>
  <script>
    function showFallback() {
      if (window.closed) return;
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('label').textContent = 'Authentification réussie.';
      document.getElementById('sub').textContent = 'Vous pouvez fermer cette fenêtre et reprendre votre validation.';
      document.getElementById('close-btn').style.display = 'inline-block';
    }

    window.msalRedirectBridge.broadcastResponseToMainFrame()
      .then(function() {
        // Le bridge a diffusé la réponse et appelé window.close()
        // Fallback si la fermeture auto n'a pas fonctionné
        setTimeout(showFallback, 1500);
      })
      .catch(function(e) {
        console.error('MSAL bridge:', e);
        showFallback();
      });
  </script>
</body>
</html>
